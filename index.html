<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">
                <img src="images/CCALogo.png" alt="City College Of Angeles Logo">
            </div>
            <div class="TextLogo">
                <img src="images/CCAText.png" alt="City College of Angeles Totalis Humane" style="width: 80%;">
            </div>
        </div>
        <div class="right">
            <form>
                <div id="login" class="view page active">
                    <h2>Login</h2>
                    <input type="text" placeholder="Username">
                    <input type="password" placeholder="Password">
                    <div class="horizalign">

                        <a href="#" type="button" onclick="showPage('register')">register</a>
                        <button type="button" onclick="goToPage()">Login</button>
                    </div>

                </div>

                <div id="register" class="view page">
                    <h2>Register</h2>
                    <input type="text" placeholder="Username">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">

                    <div class="horizalign">
                        <a href="#" type="button" onclick="showPage('login')">Back to Login</a>
                        <button>Sign Up</button>
                        
                    </div>
                    
                </div>
                <script src="script.js" defer></script>
            </form>
        </div>
    </div>
</body>
</html>
